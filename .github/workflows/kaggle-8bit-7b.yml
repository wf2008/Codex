name: Kaggle Ollama GPU (Direct Commit)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-ollama:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI and jq
        run: |
          python -m pip install --upgrade pip kaggle
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "❌ KAGGLE_API_TOKEN secret not set"
            exit 1
          fi
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "KAGGLE_API_TOKEN=$KAGGLE_API_TOKEN" >> $GITHUB_ENV

      - name: Set Kaggle username
        id: username
        run: |
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            echo "❌ KAGGLE_USERNAME secret not set"
            exit 1
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      - name: Generate unique kernel name
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          KERNEL_SLUG="ollama-gpu-${UNIQUE_SUFFIX}"
          KERNEL_ID="${{ steps.username.outputs.username }}/${KERNEL_SLUG}"
          # Title must slugify to exactly the same as KERNEL_SLUG
          KERNEL_TITLE="${KERNEL_SLUG}"
          echo "slug=${KERNEL_SLUG}" >> $GITHUB_OUTPUT
          echo "id=${KERNEL_ID}" >> $GITHUB_OUTPUT
          echo "title=${KERNEL_TITLE}" >> $GITHUB_OUTPUT

      - name: Create kernel folder (script is embedded)
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          cat > kernel-metadata.json <<EOF
          {
            "id": "${{ steps.kernel.outputs.id }}",
            "title": "${{ steps.kernel.outputs.title }}",
            "code_file": "script.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "env_vars": [
              {"name": "GITHUB_TOKEN", "value": "${{ secrets.GITHUB_TOKEN }}"},
              {"name": "GITHUB_REPO", "value": "${{ github.repository }}"}
            ]
          }
          EOF

          cat > script.py << 'EOF'
          import os
          import subprocess
          import sys
          import time
          import requests
          import re
          import base64
          from pathlib import Path

          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN")
          GITHUB_REPO = os.environ.get("GITHUB_REPO")
          FILE_PATH = "frontend/ollama_url.txt"

          def commit_to_github(content):
              url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{FILE_PATH}"
              headers = {"Authorization": f"Bearer {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}
              data = {
                  "message": "Update Ollama URL from Kaggle",
                  "content": base64.b64encode(content.encode()).decode(),
                  "branch": "main",
              }
              resp = requests.get(url, headers=headers)
              if resp.status_code == 200:
                  data["sha"] = resp.json().get("sha")
              put = requests.put(url, headers=headers, json=data)
              if put.status_code in (200, 201):
                  print("✅ Committed to GitHub")
              else:
                  print(f"❌ Failed: {put.status_code}")

          OUTPUT_DIR = Path("/kaggle/working")
          OUTPUT_DIR.mkdir(exist_ok=True)

          def log(msg):
              print(msg, flush=True)

          log("Installing zstd...")
          subprocess.run("apt-get update -qq && apt-get install -y -qq zstd", shell=True, check=True)

          log("Installing Ollama...")
          subprocess.run("curl -fsSL https://ollama.com/install.sh | sh", shell=True, check=True)

          log("Starting Ollama server...")
          os.environ["OLLAMA_HOST"] = "0.0.0.0:11434"
          os.environ["OLLAMA_ORIGINS"] = "*"
          subprocess.Popen(["ollama", "serve"], stdout=subprocess.PIPE, stderr=subprocess.PIPE)

          log("Waiting for Ollama...")
          for _ in range(30):
              try:
                  if requests.get("http://127.0.0.1:11434/", timeout=2).status_code == 200:
                      break
              except:
                  pass
              time.sleep(2)
          else:
              raise RuntimeError("Ollama not ready")

          MODEL = "huihui_ai/qwen2.5-coder-abliterate"
          log(f"Pulling {MODEL}...")
          subprocess.run(["ollama", "pull", MODEL], check=True)

          log("Downloading cloudflared...")
          subprocess.run("wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared", shell=True)
          subprocess.run("chmod +x cloudflared", shell=True)
          subprocess.run("mv cloudflared /usr/local/bin/", shell=True)

          log("Starting Cloudflare tunnel...")
          tunnel = subprocess.Popen(
              ["cloudflared", "tunnel", "--url", "http://127.0.0.1:11434", "--no-autoupdate"],
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1
          )

          pattern = re.compile(r"https://[-a-zA-Z0-9]+\.trycloudflare\.com")
          tunnel_url = None
          for line in tunnel.stdout:
              line = line.rstrip()
              log(line)
              match = pattern.search(line)
              if match:
                  tunnel_url = match.group(0)
                  log(f"TUNNEL_URL={tunnel_url}")
                  break

          if not tunnel_url:
              raise RuntimeError("No tunnel URL")

          if GITHUB_TOKEN and GITHUB_REPO:
              commit_to_github(tunnel_url)
          else:
              log("Missing GitHub credentials")

          # Keep tunnel alive for 2 hours
          log("Keeping kernel alive for 2 hours...")
          time.sleep(7200)
          EOF

      - name: Push kernel to Kaggle (force overwrite)
        run: |
          cd kaggle-kernel
          kaggle kernels push -p . --force

      - name: Wait for kernel to start (optional, just to confirm)
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>/dev/null | grep -i "status" || echo "")
            if echo "$STATUS" | grep -qi "running"; then
              echo "Kernel is running"
              exit 0
            fi
            echo "Waiting for kernel to start... ($i/30)"
            sleep 5
          done
          echo "Kernel may still be queued, but proceeding."

      - name: Wait for kernel to complete (max 2 hours)
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          for i in $(seq 1 360); do
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>/dev/null | grep -i "status" || echo "")
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "complete"; then
              echo "Kernel finished"
              exit 0
            elif echo "$STATUS" | grep -qi "error"; then
              echo "Kernel error"
              exit 1
            fi
            echo "Kernel running... ($i/360)"
            sleep 20
          done
          echo "Kernel still running after 2 hours – exiting anyway"
          exit 0

      - name: Download output files and extract URL (fallback)
        id: get_url
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          rm -rf kaggle-output
          mkdir -p kaggle-output
          kaggle kernels output "$KERNEL_ID" -p kaggle-output --force
          if [ -f kaggle-output/tunnel_url.txt ]; then
            URL=$(tr -d '\r\n' < kaggle-output/tunnel_url.txt)
            echo "url=$URL" >> $GITHUB_OUTPUT
          else
            echo "No tunnel_url.txt found – will rely on direct commit"
          fi

      - name: Ensure URL is in repo (just in case)
        run: |
          mkdir -p frontend
          if [ -n "${{ steps.get_url.outputs.url }}" ]; then
            echo "${{ steps.get_url.outputs.url }}" > frontend/ollama_url.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add frontend/ollama_url.txt
            git commit -m "Update Ollama URL from Kaggle (fallback) [skip ci]" || echo "No changes"
            git push
          fi
