name: Ollama on Kaggle GPU (Direct Commit)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-ollama:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "KAGGLE_API_TOKEN=$KAGGLE_API_TOKEN" >> $GITHUB_ENV

      - name: Set Kaggle username
        id: username
        run: |
          echo "username=${{ secrets.KAGGLE_USERNAME }}" >> $GITHUB_OUTPUT

      - name: Generate unique kernel name
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          echo "slug=ollama-gpu-${UNIQUE_SUFFIX}" >> $GITHUB_OUTPUT
          echo "id=${{ secrets.KAGGLE_USERNAME }}/ollama-gpu-${UNIQUE_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Create kernel folder with environment variables
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          cat > kernel-metadata.json <<EOF
          {
            "id": "${{ steps.kernel.outputs.id }}",
            "title": "Ollama GPU Direct",
            "code_file": "script.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "env_vars": [
              {"name": "GITHUB_REPO", "value": "${{ github.repository }}"},
              {"name": "GITHUB_TOKEN", "value": "${{ secrets.GITHUB_TOKEN }}"}
            ]
          }
          EOF

          cat > script.py << 'EOF'
          import subprocess, sys, os, time, requests, re, base64
          from pathlib import Path

          # ------------------------------------------------------------
          # 1. Setup: install zstd, Ollama, cloudflared (same as before)
          # ------------------------------------------------------------
          def log(msg): print(msg, flush=True)

          log("Installing zstd...")
          subprocess.run("apt-get update -qq && apt-get install -y -qq zstd", shell=True, check=True)

          log("Installing Ollama...")
          subprocess.run("curl -fsSL https://ollama.com/install.sh | sh", shell=True, check=True)

          log("Starting Ollama server...")
          os.environ["OLLAMA_HOST"] = "0.0.0.0:11434"
          os.environ["OLLAMA_ORIGINS"] = "*"
          server = subprocess.Popen(["ollama", "serve"], stdout=subprocess.PIPE, stderr=subprocess.PIPE)

          log("Waiting for Ollama server...")
          for _ in range(30):
              try:
                  if requests.get("http://127.0.0.1:11434/", timeout=2).status_code == 200:
                      log("Ollama server ready")
                      break
              except: pass
              time.sleep(2)
          else:
              raise RuntimeError("Ollama server did not start")

          MODEL = "huihui_ai/qwen2.5-coder-abliterate"
          log(f"Pulling model {MODEL}...")
          subprocess.run(["ollama", "pull", MODEL], check=True)

          log("Downloading cloudflared...")
          subprocess.run("wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared", shell=True)
          subprocess.run("chmod +x cloudflared", shell=True)
          subprocess.run("mv cloudflared /usr/local/bin/", shell=True)

          log("Starting Cloudflare tunnel...")
          tunnel = subprocess.Popen(
              ["cloudflared", "tunnel", "--url", "http://127.0.0.1:11434", "--no-autoupdate"],
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1
          )

          pattern = re.compile(r"https://[-a-zA-Z0-9]+\.trycloudflare\.com")
          tunnel_url = None
          for line in tunnel.stdout:
              line = line.rstrip()
              log(line)
              match = pattern.search(line)
              if match:
                  tunnel_url = match.group(0)
                  log(f"TUNNEL_URL={tunnel_url}")
                  break
          if not tunnel_url:
              raise RuntimeError("No tunnel URL found")

          # ------------------------------------------------------------
          # 2. Commit the URL directly to GitHub repository
          # ------------------------------------------------------------
          repo = os.environ.get("GITHUB_REPO")
          token = os.environ.get("GITHUB_TOKEN")
          if not repo or not token:
              log("ERROR: Missing GITHUB_REPO or GITHUB_TOKEN environment variables")
              sys.exit(1)

          # Path to the file in the repo
          file_path = "frontend/ollama_url.txt"
          api_url = f"https://api.github.com/repos/{repo}/contents/{file_path}"

          # Get current file SHA (if exists)
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
          resp = requests.get(api_url, headers=headers)
          sha = resp.json().get("sha", "") if resp.status_code == 200 else None

          # Prepare new content (base64 encoded)
          content = tunnel_url + "\n"
          encoded = base64.b64encode(content.encode()).decode()

          # Build payload
          payload = {
              "message": "Update Ollama URL from Kaggle GPU",
              "content": encoded,
              "branch": "main"
          }
          if sha:
              payload["sha"] = sha

          # Commit
          resp = requests.put(api_url, headers=headers, json=payload)
          if resp.status_code in [200, 201]:
              log("✅ Successfully committed tunnel URL to repository")
          else:
              log(f"❌ Failed to commit: {resp.status_code} - {resp.text}")
              sys.exit(1)

          # ------------------------------------------------------------
          # 3. Keep kernel alive for 6 hours
          # ------------------------------------------------------------
          log("Tunnel established. Keeping kernel alive for 6 hours.")
          time.sleep(21600)
          EOF

      - name: Push kernel to Kaggle
        run: |
          cd kaggle-kernel
          kaggle kernels push -p .

      - name: Keep runner alive (optional, to monitor logs)
        run: sleep 43200   # 12 hours, but kernel will commit URL within minutes
