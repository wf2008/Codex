name: Kaggle Ollama GPU (Direct Commit)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-ollama:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install --quiet kaggle

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "❌ KAGGLE_API_TOKEN secret not set"
            exit 1
          fi
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Set Kaggle username
        id: username
        run: |
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            echo "❌ KAGGLE_USERNAME secret not set"
            exit 1
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      - name: Generate unique kernel name
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          KERNEL_SLUG="ollama-gpu-${UNIQUE_SUFFIX}"
          KERNEL_ID="${{ steps.username.outputs.username }}/${KERNEL_SLUG}"
          KERNEL_TITLE="${KERNEL_SLUG}"
          echo "slug=${KERNEL_SLUG}" >> $GITHUB_OUTPUT
          echo "id=${KERNEL_ID}" >> $GITHUB_OUTPUT
          echo "title=${KERNEL_TITLE}" >> $GITHUB_OUTPUT

      - name: Create kernel folder
        env:
          SCRIPT_B64: ""
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          cat > kernel-metadata.json <<EOF
          {
            "id": "${{ steps.kernel.outputs.id }}",
            "title": "${{ steps.kernel.outputs.title }}",
            "code_file": "script.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true
          }
          EOF

          printf '%s' "$SCRIPT_B64" | base64 -d > script.py

          echo "--- Generated script.py (first 25 lines) ---"
          head -n 25 script.py
          echo "--- Syntax check ---"
          python3 -m py_compile script.py && echo "✅ script.py compiles"

      - name: Push kernel to Kaggle
        run: |
          cd kaggle-kernel
          kaggle kernels push -p .

      - name: Wait for kernel to publish tunnel URL
        id: wait_url
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          mkdir -p kernel-output
          echo "Polling kernel $KERNEL_ID for ollama_url.txt (up to 25 minutes)..."

          TUNNEL_URL=""
          for i in $(seq 1 50); do
            echo "[$i/50] Checking kernel status / output..."
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>&1 || true)
            echo "$STATUS"

            # Try to pull outputs (only present once the kernel has emitted them)
            kaggle kernels output "$KERNEL_ID" -p kernel-output --force >/dev/null 2>&1 || true

            if [ -f kernel-output/ollama_url.txt ]; then
              TUNNEL_URL=$(tr -d '\r\n' < kernel-output/ollama_url.txt | xargs)
              if [ -n "$TUNNEL_URL" ]; then
                echo "✅ Got tunnel URL: $TUNNEL_URL"
                break
              fi
            fi

            # Bail early if the kernel hard-failed
            if echo "$STATUS" | grep -qiE "error|failed"; then
              echo "❌ Kernel reported error state."
              exit 1
            fi

            sleep 30
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Timed out waiting for tunnel URL"
            exit 1
          fi

          # Basic sanity check on URL format
          if ! echo "$TUNNEL_URL" | grep -qE '^https://[-a-zA-Z0-9]+\.trycloudflare\.com$'; then
            echo "❌ Unexpected URL format: $TUNNEL_URL"
            exit 1
          fi

          echo "tunnel_url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Commit Ollama URL back to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TUNNEL_URL: ${{ steps.wait_url.outputs.tunnel_url }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p frontend
          printf '%s\n' "$TUNNEL_URL" > frontend/ollama_url.txt
          echo "Wrote frontend/ollama_url.txt = $TUNNEL_URL"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add frontend/ollama_url.txt
          if git diff --cached --quiet; then
            echo "No change in ollama_url.txt — nothing to commit."
            exit 0
          fi

          git commit -m "Update Ollama tunnel URL from Kaggle GPU run"
          # Push using the built-in GITHUB_TOKEN (no PAT needed thanks to permissions: contents: write)
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" HEAD:${GITHUB_REF#refs/heads/}

          echo "✅ Committed and pushed tunnel URL to $REPO"
