name: Kaggle GPU Model Server (No long sleep)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI and jq
        run: |
          python -m pip install --upgrade pip kaggle
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "❌ KAGGLE_API_TOKEN secret not set"
            exit 1
          fi

          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "KAGGLE_API_TOKEN=$KAGGLE_API_TOKEN" >> "$GITHUB_ENV"

      - name: Set Kaggle username
        id: username
        run: |
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            echo "❌ KAGGLE_USERNAME secret not set"
            exit 1
          fi
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"

      - name: Generate unique kernel name, id, and title
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          KERNEL_SLUG="qwen-server-${UNIQUE_SUFFIX}"
          KERNEL_ID="${{ steps.username.outputs.username }}/${KERNEL_SLUG}"
          KERNEL_TITLE="Qwen Server ${UNIQUE_SUFFIX}"

          echo "slug=${KERNEL_SLUG}" >> "$GITHUB_OUTPUT"
          echo "id=${KERNEL_ID}" >> "$GITHUB_OUTPUT"
          echo "title=${KERNEL_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create kernel folder
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          cat > kernel-metadata.json <<EOF
          {
            "id": "${{ steps.kernel.outputs.id }}",
            "title": "${{ steps.kernel.outputs.title }}",
            "code_file": "server.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true
          }
          EOF

          cat > server.py << 'EOF'
          import re
          import subprocess
          import sys
          import time
          from pathlib import Path

          import requests

          OUTPUT_DIR = Path("/kaggle/working")
          OUTPUT_DIR.mkdir(parents=True, exist_ok=True)
          URL_FILE = OUTPUT_DIR / "tunnel_url.txt"
          LOG_FILE = OUTPUT_DIR / "server_status.log"
          CLOUDFLARED_LOG = OUTPUT_DIR / "cloudflared.log"

          def log(msg):
              print(msg, flush=True)
              with LOG_FILE.open("a", encoding="utf-8") as f:
                  f.write(msg + "\n")

          log("Installing dependencies...")
          subprocess.run(
              [sys.executable, "-m", "pip", "install", "-q", "vllm", "cloudflared", "torch", "transformers", "accelerate", "requests"],
              check=True,
          )

          model = "huihui_ai/qwen2.5-coder-abliterate"

          log("Starting vLLM server...")
          subprocess.Popen([
              sys.executable,
              "-m", "vllm.entrypoints.openai.api_server",
              "--model", model,
              "--port", "8000",
              "--max-model-len", "4096",
              "--gpu-memory-utilization", "0.9",
              "--trust-remote-code",
          ])

          log("Waiting for vLLM server to become healthy...")
          for _ in range(180):
              try:
                  r = requests.get("http://127.0.0.1:8000/health", timeout=3)
                  if r.status_code == 200:
                      log("vLLM is healthy")
                      break
              except Exception:
                  pass
              time.sleep(5)
          else:
              URL_FILE.write_text("ERROR_SERVER_START\n", encoding="utf-8")
              log("ERROR: vLLM server did not become ready")
              sys.exit(1)

          log("Starting Cloudflare tunnel...")
          tunnel = subprocess.Popen(
              ["cloudflared", "tunnel", "--url", "http://127.0.0.1:8000", "--no-autoupdate"],
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              bufsize=1,
          )

          pattern = re.compile(r"https://[-a-zA-Z0-9]+\.trycloudflare\.com")
          tunnel_url = None

          with open(CLOUDFLARED_LOG, "w", encoding="utf-8") as cf_log:
              for line in tunnel.stdout:
                  line = line.rstrip()
                  log(line)
                  cf_log.write(line + "\n")
                  cf_log.flush()
                  match = pattern.search(line)
                  if match:
                      tunnel_url = match.group(0)
                      URL_FILE.write_text(tunnel_url + "\n", encoding="utf-8")
                      log(f"TUNNEL_URL={tunnel_url}")
                      break

          if not tunnel_url:
              URL_FILE.write_text("ERROR_TUNNEL_START\n", encoding="utf-8")
              log("ERROR: No tunnel URL found")
              sys.exit(1)

          log("Tunnel established successfully. Exiting kernel (no long wait).")
          # No sleep – kernel exits immediately after capturing URL.
          EOF

      - name: Push kernel to Kaggle
        run: |
          cd kaggle-kernel
          kaggle kernels push -p .

      - name: Wait for kernel to finish (complete or error)
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          for i in $(seq 1 180); do
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>/dev/null | grep -i "status" || echo "")
            echo "$STATUS"
            if echo "$STATUS" | grep -qi "complete"; then
              echo "Kernel finished successfully"
              exit 0
            elif echo "$STATUS" | grep -qi "error"; then
              echo "Kernel encountered an error"
              exit 0
            fi
            echo "Waiting for kernel to finish... ($i/180)"
            sleep 20
          done
          echo "❌ Kernel did not finish within timeout (60 minutes)"
          exit 1

      - name: Download all output files and display logs
        id: get_url
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          rm -rf kaggle-output
          mkdir -p kaggle-output

          # Download all output files
          kaggle kernels output "$KERNEL_ID" -p kaggle-output --force --quiet

          echo "========================================="
          echo "📄 server_status.log:"
          if [ -f kaggle-output/server_status.log ]; then
            cat kaggle-output/server_status.log
          else
            echo " (not found)"
          fi

          echo "========================================="
          echo "📄 cloudflared.log:"
          if [ -f kaggle-output/cloudflared.log ]; then
            cat kaggle-output/cloudflared.log
          else
            echo " (not found)"
          fi
          echo "========================================="

          # Extract tunnel URL if present
          URL=""
          if [ -f kaggle-output/tunnel_url.txt ]; then
            URL=$(tr -d '\r\n' < kaggle-output/tunnel_url.txt)
            if [ "$URL" = "ERROR_SERVER_START" ] || [ "$URL" = "ERROR_TUNNEL_START" ]; then
              echo "❌ Kernel reported an error: $URL"
              exit 1
            fi
          fi

          if [ -z "$URL" ]; then
            echo "❌ No tunnel URL found. Check logs above for details."
            exit 1
          fi

          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Commit URL to repository
        run: |
          mkdir -p frontend
          echo "${{ steps.get_url.outputs.url }}" > frontend/ollama_url.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/ollama_url.txt
          git commit -m "Update Ollama URL from Kaggle [skip ci]" || echo "No changes"
          git push

      - name: Delete kernel (cleanup)
        if: always()
        env:
          KERNEL_ID: ${{ steps.kernel.outputs.id }}
        run: |
          kaggle kernels delete "$KERNEL_ID" -y || true
