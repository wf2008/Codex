name: Kaggle GPU Model Server (2h)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Set up Kaggle API token (new format)
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          # Also set environment variable for the CLI
          echo "KAGGLE_API_TOKEN=$KAGGLE_API_TOKEN" >> $GITHUB_ENV

      - name: Generate unique kernel name
        id: kernel
        run: echo "name=qwen-server-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Create Kaggle kernel folder
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          # Create kernel metadata with the unique ID (format: username/kernel-name)
          # We need a dummy username because Kaggle CLI still expects it in metadata.
          # The actual authentication is via token, so any placeholder works.
          cat > kernel-metadata.json << EOF
          {
           "id": "dummy/${{ steps.kernel.outputs.name }}",
           "title": "Qwen 7B Server (2h)",
           "code_file": "server.py",
           "language": "python",
           "kernel_type": "script",
           "is_private": true,
           "enable_gpu": true,
           "enable_internet": true
          }
          EOF

          # The Python script that runs the model and tunnel
          cat > server.py << 'EOF'
          import subprocess, time, requests, os

          # Install dependencies
          subprocess.run(["pip", "install", "-q", "vllm", "cloudflared"])

          # Model (8‑bit GPTQ, fits in T4)
          MODEL = "Qwen/Qwen2.5-Coder-7B-Instruct-GPTQ-Int8"

          # Start vLLM server
          server = subprocess.Popen([
              "python", "-m", "vllm.entrypoints.openai.api_server",
              "--model", MODEL, "--port", "8000", "--max-model-len", "4096",
              "--gpu-memory-utilization", "0.9", "--quantization", "gptq",
              "--dtype", "float16", "--trust-remote-code"
          ], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          # Wait for server
          for _ in range(180):
              try:
                  if requests.get("http://localhost:8000/health", timeout=2).status_code == 200:
                      break
              except:
                  pass
              time.sleep(1)

          # Start Cloudflare tunnel
          tunnel = subprocess.Popen(
              ["cloudflared", "tunnel", "--url", "http://localhost:8000", "--no-autoupdate"],
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True
          )

          # Capture tunnel URL
          url = None
          for line in tunnel.stdout:
              if "https://" in line and ".trycloudflare.com" in line:
                  url = line.split("https://")[1].split()[0]
                  url = "https://" + url
                  break
          print(f"TUNNEL_URL={url}")

          # Keep kernel alive for 2 hours (7200 seconds)
          time.sleep(7200)
          EOF

      - name: Push kernel to Kaggle
        run: |
          cd kaggle-kernel
          kaggle kernels push -p .

      - name: Wait for kernel to produce URL (max 10 min)
        id: get_url
        run: |
          KERNEL_ID="dummy/${{ steps.kernel.outputs.name }}"
          URL=""
          for i in {1..120}; do
            # Download kernel logs
            kaggle kernels output "$KERNEL_ID" -p . 2>/dev/null || true
            if [ -f kernel.log ] && grep -q "TUNNEL_URL=" kernel.log; then
              URL=$(grep "TUNNEL_URL=" kernel.log | head -1 | cut -d= -f2)
              break
            fi
            echo "Waiting for tunnel... ($i/120)"
            sleep 5
          done
          if [ -z "$URL" ]; then
            echo "❌ Failed to get tunnel URL"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Commit URL to repository
        run: |
          mkdir -p frontend
          echo "${{ steps.get_url.outputs.url }}" > frontend/ollama_url.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/ollama_url.txt
          git commit -m "Update Ollama URL from Kaggle (2h) [skip ci]" || echo "No changes"
          git push
