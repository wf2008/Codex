name: Kaggle GPU Model Server (2h)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kaggle CLI and jq
        run: |
          pip install kaggle
          sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "KAGGLE_API_TOKEN=$KAGGLE_API_TOKEN" >> $GITHUB_ENV

      - name: Set Kaggle username
        id: username
        run: |
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            echo "❌ KAGGLE_USERNAME secret not set"
            exit 1
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      - name: Generate unique kernel name and slug
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          KERNEL_SLUG="qwen-server-${UNIQUE_SUFFIX}"
          KERNEL_ID="${{ steps.username.outputs.username }}/${KERNEL_SLUG}"
          echo "slug=${KERNEL_SLUG}" >> $GITHUB_OUTPUT
          echo "id=${KERNEL_ID}" >> $GITHUB_OUTPUT

      - name: Create kernel folder
        run: |
          mkdir -p kaggle-kernel
          cd kaggle-kernel

          # ============================================================
          # CORRECT METADATA FOR A "SCRIPT" KERNEL
          # ============================================================
          cat > kernel-metadata.json << EOF
          {
           "id": "${{ steps.kernel.outputs.id }}",
           "title": "Qwen 7B Server",
           "code_file": "server.py",
           "language": "python",
           "kernel_type": "script",
           "is_private": true,
           "enable_gpu": true,
           "enable_internet": true
          }
          EOF

          # The server script (using your model)
          cat > server.py << 'EOF'
          import subprocess, time, requests, sys, os

          print("Installing dependencies...")
          subprocess.run([sys.executable, "-m", "pip", "install", "-q", "vllm", "cloudflared", "torch", "transformers", "accelerate"])

          # YOUR MODEL NAME
          MODEL = "huihui_ai/qwen2.5-coder-abliterate"

          print("Starting vLLM server...")
          server = subprocess.Popen([
              "python", "-m", "vllm.entrypoints.openai.api_server",
              "--model", MODEL, "--port", "8000", "--max-model-len", "4096",
              "--gpu-memory-utilization", "0.9", "--trust-remote-code"
          ])

          print("Waiting for vLLM server to be ready...")
          for _ in range(120):
              try:
                  if requests.get("http://localhost:8000/health", timeout=2).status_code == 200:
                      break
              except:
                  pass
              time.sleep(1)

          print("Starting Cloudflare tunnel...")
          tunnel = subprocess.Popen(
              ["cloudflared", "tunnel", "--url", "http://localhost:8000", "--no-autoupdate"],
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True
          )

          url = None
          for line in tunnel.stdout:
              if "https://" in line and ".trycloudflare.com" in line:
                  url = line.split("https://")[1].split()[0]
                  url = "https://" + url
                  break
          if url:
              print(f"TUNNEL_URL={url}")
          else:
              print("TUNNEL_URL=ERROR")

          # Keep kernel alive for 2 hours
          time.sleep(7200)
          EOF

      - name: Push kernel to Kaggle
        run: |
          cd kaggle-kernel
          kaggle kernels push -p .

      - name: Wait for tunnel URL and capture it
        id: get_url
        run: |
          KERNEL_SLUG="${{ steps.kernel.outputs.slug }}"
          URL=""
          for i in {1..120}; do
            # The kernel slug is just the name, not the full ID
            kaggle kernels output "$KERNEL_SLUG" -p . 2>/dev/null || true
            if [ -f kernel.log ] && grep -q "TUNNEL_URL=" kernel.log; then
              URL=$(grep "TUNNEL_URL=" kernel.log | head -1 | cut -d= -f2)
              if [ "$URL" != "ERROR" ]; then
                break
              fi
            fi
            echo "Waiting for tunnel... ($i/120)"
            sleep 5
          done
          if [ -z "$URL" ] || [ "$URL" = "ERROR" ]; then
            echo "❌ Failed to get tunnel URL"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Commit URL to repository
        run: |
          mkdir -p frontend
          echo "${{ steps.get_url.outputs.url }}" > frontend/ollama_url.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/ollama_url.txt
          git commit -m "Update Ollama URL from Kaggle [skip ci]" || echo "No changes"
          git push
