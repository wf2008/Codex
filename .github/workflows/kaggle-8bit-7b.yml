name: Kaggle Vision Agent (Multi-Agent + Cloudflare) - 3h Runtime

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  start-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hours of margin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install --upgrade kaggle

      - name: Set up Kaggle API token
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          if [ -n "$KAGGLE_USERNAME" ] && [ -n "$KAGGLE_KEY" ]; then
            echo "🔐 Using KAGGLE_USERNAME + KAGGLE_KEY secrets"
            printf '{"username":"%s","key":"%s"}\n' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          elif [ -n "$KAGGLE_API_TOKEN" ]; then
            echo "🔐 Using raw KAGGLE_API_TOKEN secret (expected to be the kaggle.json JSON)"
            echo "$KAGGLE_API_TOKEN" > ~/.kaggle/kaggle.json
          else
            echo "❌ No Kaggle credentials found. Set KAGGLE_USERNAME + KAGGLE_KEY or KAGGLE_API_TOKEN."
            exit 1
          fi
          chmod 600 ~/.kaggle/kaggle.json
          python -c "import json,os; d=json.load(open(os.path.expanduser('~/.kaggle/kaggle.json'))); assert 'username' in d and 'key' in d, 'kaggle.json must contain username and key'; print('✅ kaggle.json OK for user:', d['username'])"

      - name: Resolve Kaggle username
        id: username
        run: |
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            USERNAME=$(python -c "import json,os;print(json.load(open(os.path.expanduser('~/.kaggle/kaggle.json')))['username'])")
          fi
          if [ -z "$USERNAME" ]; then
            echo "❌ Could not resolve Kaggle username"
            exit 1
          fi
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "✅ Kaggle username: $USERNAME"

      - name: Generate unique kernel name
        id: kernel
        run: |
          UNIQUE_SUFFIX=$(date +%s)
          KERNEL_SLUG="vision-agent-${UNIQUE_SUFFIX}"
          KERNEL_ID="${{ steps.username.outputs.username }}/${KERNEL_SLUG}"
          KERNEL_TITLE="${KERNEL_SLUG}"
          echo "slug=${KERNEL_SLUG}" >> "$GITHUB_OUTPUT"
          echo "id=${KERNEL_ID}"     >> "$GITHUB_OUTPUT"
          echo "title=${KERNEL_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Stage kernel files
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          rm -rf staging
          mkdir -p staging
          # Write metadata
          cat > staging/kernel-metadata.json <<METAEOF
          {
            "id": "${{ steps.kernel.outputs.id }}",
            "title": "${{ steps.kernel.outputs.title }}",
            "code_file": "script.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true
          }
          METAEOF

          # Copy the script.py committed in the repo
          cp kaggle-kernel/script.py staging/script.py

          # Inject runtime secrets into the script (placeholders → real values)
          python - <<'PYEOF'
          import os, pathlib
          p = pathlib.Path("staging/script.py")
          s = p.read_text()
          s = s.replace("__GITHUB_TOKEN__", os.environ.get("MY_GITHUB_TOKEN", ""))
          s = s.replace("__REPO__",         os.environ.get("GH_REPO", ""))
          p.write_text(s)
          print("✅ Secrets injected into staging/script.py")
          PYEOF

          echo "----- staging/ -----"
          ls -la staging
          echo "----- metadata -----"
          cat staging/kernel-metadata.json
          echo "----- script head -----"
          head -n 25 staging/script.py

      - name: Push kernel to Kaggle
        run: |
          cd staging
          kaggle kernels push -p .

      - name: Sleep to keep workflow alive (3h)
        run: |
          echo "💤 Kernel pushed. Sleeping 10800s (3h) to keep the workflow alive while the kernel runs."
          sleep 10800
          echo "⏰ 3h sleep finished."
          
