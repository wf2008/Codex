services:
  - type: web
    name: wfagent-pro
    runtime: docker
    plan: standard
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GITHUB_URL
        value: https://raw.githubusercontent.com/wf2008/Codex/main/frontend/ollama_url.txt
      - key: STREAMLIT_SERVER_PORT
        value: 10000
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
    disk:
      name: workspace
      mountPath: /app/workspace
      sizeGB: 2
    healthCheckPath: /_stcore/health
